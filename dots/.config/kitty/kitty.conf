# Theming
include ~/.local/state/quickshell/user/generated/terminal/kitty-theme.conf

# Font
font_family Maple Mono NF CN
font_size 11.0

# Cursor
cursor_shape beam
cursor_trail 1

# Padding (why weird value? consistency with foot)
window_margin_width 15

# No stupid close confirmation
confirm_os_window_close 0

# Session management
startup_session none
# You can create a session file (e.g., ~/.config/kitty/session.conf) and set it here:
# startup_session ~/.config/kitty/session.conf

# Use fish shell
shell fish

# Copy
map ctrl+c    copy_or_interrupt

# Search
map ctrl+f   launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id
map kitty_mod+f   launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id

# Scroll & Zoom
map page_up    scroll_page_up
map page_down    scroll_page_down

map ctrl+plus  change_font_size all +1
map ctrl+equal  change_font_size all +1
map ctrl+kp_add  change_font_size all +1
map ctrl+minus       change_font_size all -1
map ctrl+underscore       change_font_size all -1
map ctrl+kp_subtract       change_font_size all -1
map ctrl+0 change_font_size all 0
map ctrl+kp_0 change_font_size all 0

background_opacity 0.85

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style round
tab_bar_align left
tab_bar_min_tabs 2
tab_title_template " 󰓩 {index} {title} "
# active_tab_title_template " 󰓩 {index} {title} "

# Tab bar colors
active_tab_font_style   normal
inactive_tab_font_style normal
# active_tab_foreground   #000000
# active_tab_background   #98c379
# inactive_tab_foreground #abb2bf
# inactive_tab_background #282c34
# tab_bar_background      #1e222a
tab_bar_margin_color    none

# --- Tab Management Shortcuts ---

# Switch to specific tab by number (1-9)
map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4
map ctrl+5 goto_tab 5
map ctrl+6 goto_tab 6
map ctrl+7 goto_tab 7
map ctrl+8 goto_tab 8
map ctrl+9 goto_tab 9

# Rename current tab
map ctrl+shift+r set_tab_title
